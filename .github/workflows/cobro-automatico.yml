name: Ciclo de Cobro Automático

on:
  schedule:
    - cron: '0 13 * * *'   # 8am Colombia (UTC-5) = 13:00 UTC
  workflow_dispatch:        # permite ejecutarlo manualmente desde GitHub

jobs:
  cobrar:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar ciclo de cobro
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://olcevdnhmexaahymfzii.supabase.co/functions/v1/cobro-automatico" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          echo "HTTP $STATUS"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ] || exit 1
